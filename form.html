<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reg form.css">
</head>
<body>
    <h2>Student Registration form </h2>
    <form>
        Name:
    <br>
       <input type="text" placeholder="enter your name">
        <br><br>
       Email:
       <br>
       <input type="email" placeholder="enter your email">
        <br><br>
        Password:
        <br>
        <input type="password" placeholder="enter your password">
        <br><br>
        Gender:
        <br>
        <input type="radio" placeholder="gender"> male
        <br>
        <input type="radio" placeholder="gender"> female
        <br>
        <input type="radio" placeholder="gender"> other
        <br><br>
        skills:
        <br>
        <input type="checkbox" placeholder="html"> html
        <br><br>
        <br>
        <input type="checkbox" placeholder="css"> css
        <br><br>
        Message:
        <br>
        <textarea rows="4" cols=" 38" placeholder=" Write a message"></textarea>
         <br><br>
         Submit button: 
         <br>
        <input type ="submit">
         <br><br>
    
    </form>
</body>
</html>
